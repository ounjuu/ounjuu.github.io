<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>김은주 — Frontend Developer</title>
<meta name="description" content="React, TypeScript, Next.js 기반 프론트엔드 개발자 김은주의 포트폴리오. 키오스크 웹앱 유지보수, AI 기반 모바일 앱 LunaFortune 등 1인·팀 프로젝트를 다룹니다." />
<meta name="author" content="Eunju Kim" />
<meta property="og:title" content="김은주 — Frontend Developer" />
<meta property="og:description" content="인터페이스의 디테일로 사용자의 마음을 움직이는 프론트엔드 개발자." />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Text"', '"SF Pro Display"', '"Pretendard Variable"', 'Pretendard', '"Apple SD Gothic Neo"', 'system-ui', 'sans-serif'],
          display: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Display"', '"Pretendard Variable"', 'Pretendard', '"Apple SD Gothic Neo"', 'sans-serif'],
          mono: ['ui-monospace', '"SF Mono"', '"JetBrains Mono"', 'monospace'],
          kor: ['"Pretendard Variable"', 'Pretendard', '"Apple SD Gothic Neo"', '-apple-system', 'sans-serif'],
        },
        colors: {
          paper: '#FAF8F5',
          paper2: '#F2EEE8',
          ink: '#1A1A1A',
          ink2: '#4A4A4A',
          mute: '#8A8580',
          line: '#E5E1DA',
          accent: '#6B4FE8',
          accentSoft: '#EDE9FB',
        },
      },
    },
  };
</script>
<style>
  html { scroll-behavior: smooth; }
  body {
    background: #FAF8F5;
    color: #1A1A1A;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Pretendard Variable", Pretendard, "Apple SD Gothic Neo", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.01em;
  }
  .kor { font-family: "Pretendard Variable", Pretendard, "Apple SD Gothic Neo", -apple-system, sans-serif; letter-spacing: -0.02em; }
  .kor-serif { font-family: "Pretendard Variable", Pretendard, "Apple SD Gothic Neo", -apple-system, sans-serif; letter-spacing: -0.03em; font-weight: 600; }
  .font-serif { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Pretendard Variable", Pretendard, sans-serif !important; letter-spacing: -0.03em; font-weight: 600; }
  .serif-italic { font-style: italic; font-weight: 500; letter-spacing: -0.02em; }

  ::selection { background: #6B4FE8; color: #fff; }

  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 1s cubic-bezier(0.22, 1, 0.36, 1), transform 1s cubic-bezier(0.22, 1, 0.36, 1); }
  .reveal.in { opacity: 1; transform: translateY(0); }

  .ulink { position: relative; display: inline-block; color: inherit; }
  .ulink::after {
    content: '';
    position: absolute; left: 0; right: 0; bottom: -2px;
    height: 1px; background: currentColor;
    transform: scaleX(1); transform-origin: right;
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .ulink:hover::after { transform: scaleX(0); transform-origin: left; }
  .ulink-hover::after { transform: scaleX(0); transform-origin: left; }
  .ulink-hover:hover::after { transform: scaleX(1); }

  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .marquee-track { animation: marquee 50s linear infinite; }

  .accent-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #6B4FE8;
    vertical-align: middle;
  }

  .proj-card { transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
  .proj-card:hover { transform: translateY(-4px); }
  .proj-cover { overflow: hidden; position: relative; }
  .proj-cover-inner {
    transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    width: 100%; height: 100%;
  }
  .proj-card:hover .proj-cover-inner { transform: scale(1.03); }

  .num-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #8A8580;
    text-transform: uppercase;
  }

  nav.scrolled {
    background: rgba(250, 248, 245, 0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid #E5E1DA;
  }

  .skill-row { transition: background 0.3s ease; }
  .skill-row:hover { background: #F2EEE8; }
  .skill-row:hover .skill-arrow { transform: translateX(4px); opacity: 1; }
  .skill-arrow { transition: all 0.3s ease; opacity: 0; }

  .exp-row { transition: padding 0.4s ease; }
  .exp-row:hover { padding-left: 12px; }

  .cover-luna { background: linear-gradient(180deg, #1A1530 0%, #2D2356 100%); color: #FAF8F5; }
  .cover-receipt { background: #F2EEE8; color: #1A1A1A; }
  .cover-coco { background: linear-gradient(135deg, #EDE9FB 0%, #E5DFFA 100%); color: #1A1A1A; }
  .cover-pet { background: #1A1A1A; color: #FAF8F5; }

  .display-h {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Pretendard Variable", Pretendard, sans-serif;
    font-weight: 600;
    letter-spacing: -0.045em;
    line-height: 1.2;
    padding-top: 0.18em;
  }
  .letter { padding-top: 0.05em; }

  .btn-quiet { border: 1px solid #1A1A1A; transition: all 0.3s ease; }
  .btn-quiet:hover { background: #1A1A1A; color: #FAF8F5; }
  .btn-accent { background: #1A1A1A; color: #FAF8F5; transition: all 0.3s ease; }
  .btn-accent:hover { background: #6B4FE8; }

  .tag {
    border: 1px solid #E5E1DA;
    color: #4A4A4A;
    font-size: 11px;
    letter-spacing: 0.04em;
    padding: 4px 10px;
    border-radius: 999px;
    background: transparent;
  }

  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: #FAF8F5; }
  ::-webkit-scrollbar-thumb { background: #D8D3CB; border-radius: 999px; border: 2px solid #FAF8F5; }
  ::-webkit-scrollbar-thumb:hover { background: #B8B3AB; }

  .letter { display: inline-block; opacity: 0; transform: translateY(16px); animation: letterIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
  @keyframes letterIn { to { opacity: 1; transform: translateY(0); } }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="/assets/js/app.jsx"></script>
</body>
</html>
